[project]
site_name = "Scaedumar"
site_description = "Player and technical documentation portal for Scaedumar."
site_url = "https://abhuva.github.io/scaedumar/"
site_author = "abhuva"
copyright = "Copyright &copy; 2026 Scaedumar contributors"
extra_css = ["stylesheets/game-theme.css"]
nav = [
  { "Player Site" = [
    { "Home" = "index.md" },
    { "Game Overview" = "game/overview.md" },
    { "World And Setting" = "game/world.md" },
    { "Survival Loop" = "game/survival-loop.md" },
    { "Current Prototype" = "game/current-prototype.md" },
    { "Getting Started" = "guide/getting-started.md" },
    { "Controls" = "guide/controls.md" },
    { "Field Notes" = "wiki/index.md" }
  ] },
  { "Technical Wiki" = [
    { "Map Of Content" = "moc.md" },
    { "Architecture" = "ARCHITECTURE.md" },
    { "Gameplay Design" = "GAMEPLAY_DESIGN.md" },
    { "Activity Model" = "ACTIVITY_MODEL.md" },
    { "Content Authoring" = "WIKI_EVENT_DIALOG_DESIGN.md" },
    { "Rendering" = "RENDER_LUT_DESIGN.md" },
    { "UI Architecture" = "RD_UI_ARCHITECTURE.md" }
  ] },
  { "Design Notes" = [
    { "Setting Direction" = "design/setting-direction.md" },
    { "Core Worldview" = "design/core-worldview.md" },
    { "Systems As Meaning" = "design/systems-as-meaning.md" },
    { "Meaning And Worldview" = "design/meaning-and-worldview.md" }
  ] }
]

[project.theme]
language = "en"
features = [
  "navigation.sections",
  "navigation.top",
  "navigation.instant",
  "search.highlight",
  "navigation.footer"
]

[project.theme.font]
text = "Cormorant Garamond"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "black"
accent = "green"
